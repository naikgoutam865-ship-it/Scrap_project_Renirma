{% extends "base.html" %}

{% block content %}

<style>

.payout-wrapper{
min-height:75vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

.payout-card{
max-width:450px;
width:100%;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-radius:20px;
padding:35px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
animation:fadeUp .7s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.payout-title{
text-align:center;
font-weight:800;
margin-bottom:25px;
}

.payout-info{
background:#f8f9fa;
padding:12px 15px;
border-radius:10px;
margin-bottom:10px;
font-weight:500;
}

.payout-card input{
height:45px;
border-radius:10px;
border:1px solid #ddd;
padding:0 12px;
}

.pay-btn{
margin-top:15px;
border:none;
border-radius:30px;
font-weight:700;
padding:10px;
background:linear-gradient(135deg,#11998e,#38ef7d);
color:white;
transition:.3s;
}

.pay-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

</style>

<div class="payout-wrapper">

<div class="payout-card">

<h3 class="payout-title">💰 Complete Payout</h3>

<div class="payout-info">
<strong>User:</strong> {{ withdraw.user.username }}
</div>

<div class="payout-info">
<strong>Amount:</strong> ₹ {{ withdraw.amount }}
</div>

<form method="POST">

{% csrf_token %}

<label class="mt-3">Transaction Reference</label>

<input
type="text"
name="reference"
class="form-control"
placeholder="UPI / Bank transaction ID"
required>

<div class="d-grid">
<button class="pay-btn">
✔ Mark as Paid
</button>
</div>

</form>

</div>

</div>

{% endblock %}
