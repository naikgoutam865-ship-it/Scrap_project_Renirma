{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>

/* ===== Background ===== */
body{
    background: linear-gradient(135deg,#87c2ec,#f8fbff);
}

/* ===== Card ===== */
.clean-card{
    background:#ffffff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,0.08);
    border:1px solid #eaeaea;
}

/* ===== Title ===== */
.form-title h3{
    font-weight:800;
    text-align:center;
    color:#1a1a1a;
}

.form-title p{
    text-align:center;
    color:#6c757d;
}

/* ===== Category Badge ===== */
.category-box{
    background:linear-gradient(135deg,#0d6efd,#198754);
    color:#fff;
    padding:12px;
    border-radius:12px;
    text-align:center;
    font-weight:600;
    margin-bottom:25px;
}

/* ===== Inputs ===== */
.input-group-pro{
    margin-bottom:20px;
}

.input-group-pro input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:15px;
    transition:.25s;
}

/* Focus */
.input-group-pro input:focus{
    border-color:#0d6efd;
    box-shadow:0 0 0 3px rgba(13,110,253,0.15);
    outline:none;
}

/* 🔥 CUSTOM CATEGORY INPUT (NEW PREMIUM STYLE) */
.custom-input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:15px;
    margin-bottom:20px;
    background:#f9fbff;
    transition:.3s;
}

.custom-input:focus{
    border-color:#198754;
    box-shadow:0 0 0 3px rgba(25,135,84,0.2);
    outline:none;
    background:#fff;
}

/* ===== Upload ===== */
.upload-box{
    border:2px dashed #ccc;
    border-radius:12px;
    padding:25px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
    color:#6c757d;
}

.upload-box:hover{
    border-color:#0d6efd;
    color:#0d6efd;
    background:#f5f9ff;
}

/* ===== Button ===== */
.submit-btn{
    border-radius:12px;
    padding:14px;
    font-weight:700;
    background:linear-gradient(135deg,#0d6efd,#198754);
    border:none;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(13,110,253,0.25);
}

/* ===== File Name ===== */
.fileName{
    margin-top:10px;
    font-size:13px;
    text-align:center;
    color:#198754;
}

/* ===== Container spacing ===== */
.wrapper{
    margin-top:60px;
}

.ai-box{
    display:none;
    margin-top:20px;
    padding:18px;
    border-radius:12px;
    background:#f8fbff;
    border:1px solid #e3f2fd;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
    animation:fadeIn .4s ease;
}

.ai-box h5{
    font-weight:700;
    margin-bottom:10px;
}

.ai-box p{
    margin:5px 0;
    font-size:14px;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* 🔥 Current Location Button */
.current-location-btn{
    margin-bottom: 15px;
    border-radius:12px;
    padding:12px;
    font-weight:600;
    font-size:14px;
    border:none;
    background:linear-gradient(135deg,#0d6efd,#00b4d8);
    color:#fff;
    transition:all .3s ease;
    box-shadow:0 6px 18px rgba(13,110,253,0.25);
}

/* Hover Effect */
.current-location-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(13,110,253,0.35);
    background:linear-gradient(135deg,#0b5ed7,#0096c7);
}

/* Click Effect */
.current-location-btn:active{
    transform:scale(0.98);
}

/* Disabled state */
.current-location-btn:disabled{
    background:#adb5bd;
    cursor:not-allowed;
    box-shadow:none;
}

</style>

<div class="row justify-content-center wrapper">
    <div class="col-md-8 col-lg-6">

        <div class="clean-card">

            <div class="form-title mb-4">
                <h3>♻️ List Your Scrap</h3>
                <p>Add scrap details and connect with buyers easily</p>
            </div>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- CATEGORY -->
                <div class="category-box">
                    📦 Category: {{ selected_category|title }}
                </div>

                <input type="hidden"
                       name="category"
                       value="{{ selected_category }}">
                
                <!-- 🔥 CUSTOM CATEGORY FIELD -->
                {% if selected_category == "other" %}
                    <input type="text"
                           name="custom_category"
                           class="custom-input"
                           placeholder="✏️ Enter your scrap name (e.g. Battery, Wood, Tyre)">
                {% endif %}
                
                <!-- WEIGHT -->
                <div class="input-group-pro">
                    <input type="number" step="0.01" name="weight_kg" placeholder="Weight (kg)" required>
                </div>

                <!-- PRICE -->
                <div class="input-group-pro">
                    <input type="number" step="0.01" name="price_per_kg" placeholder="Price per kg (₹)" required>
                </div>

                <!-- 🔥 CURRENT LOCATION BUTTON -->
                <button type="button" id="currentLocationBtn" class="current-location-btn">
                    📍 Use My Current Location
                </button>

                <!-- LOCATION -->
                <div class="input-group-pro">
                    <input type="text" id="locationInput" name="location" placeholder="📍 Selected Location" required readonly>
                </div>

                <div id="map" style="height:350px; border-radius:12px; margin-bottom:20px;"></div>

                <!-- IMAGE -->
                <label class="upload-box w-100">
                    📷 Upload Scrap Image
                    <input type="file" name="image" id="imageInput" hidden>
                </label>

                <p id="fileName" class="fileName"></p>

                <!-- SUBMIT -->
                <div class="d-grid mt-3">
                    <button type="submit" class="btn text-white submit-btn">
                        🚀 Publish Scrap
                    </button>
                </div>

            </form>

            <!-- AI RESULT BOX -->
            <div id="ai-price-box" class="ai-box"></div>

        </div>

    </div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const fileNameText = document.getElementById("fileName");

imageInput.addEventListener("change", function() {
    fileNameText.textContent = this.files.length > 0 
        ? "Selected: " + this.files[0].name 
        : "";
});
</script>

<script>
function getAIPrice(){

    const category = document.querySelector("[name=category]").value;
    const weight = document.querySelector("[name=weight_kg]").value;
    const location = document.querySelector("[name=location]").value;

    if (!weight || !location) return;

    console.log("AI CALL:", category, weight, location);

    fetch(`/scrap/ai-price/?category=${category}&weight=${weight}&location=${location}`)
    .then(res => {
        console.log("API HIT");
        return res.json();
    })
    .then(data => {
        console.log("DATA:", data);

        const box = document.getElementById("ai-price-box");

        box.style.display = "block";

        box.innerHTML = `
            <h5>🤖 Smart Market Analysis</h5>
            
            <p><b>Total Value:</b> ₹${data.total}</p>
            <p><b>Estimated Price:</b> ₹${data.price}/kg</p>
            <p><b>Range:</b> ₹${data.min} – ₹${data.max}/kg</p>
            <p><b>Demand:</b> ${data.demand}</p>
            <p><b>Resale:</b> ${data.resale}</p>
            <p style="margin-top:8px;">💡 ${data.insight}</p>
        `;
    })
    .catch(err => console.log("AI Error:", err));
}

// 🔥 BETTER EVENT
document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", getAIPrice);
});

// 🔥 EXTRA SAFETY
document.querySelector("[name=location]").addEventListener("input", getAIPrice);

// 🔥 AUTO CALL
window.onload = function() {
    getAIPrice();
};
</script>
<!-- ................................................................................................................................./ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

var map = L.map('map').setView([20.5937, 78.9629], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

var marker = L.marker([20.5937, 78.9629], {draggable:true}).addTo(map);

marker.on('dragend', function(e){

    var lat = marker.getLatLng().lat;
    var lon = marker.getLatLng().lng;

    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
    .then(res => res.json())
    .then(data => {

        const address = data.display_name;
        document.getElementById("locationInput").value = address;

    });

});

map.on('click', function(e){

    marker.setLatLng(e.latlng);

    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
    .then(res => res.json())
    .then(data => {

        document.getElementById("locationInput").value = data.display_name;

    });

});

</script>

<script>

// 🔥 CURRENT LOCATION BUTTON LOGIC
document.getElementById("currentLocationBtn").addEventListener("click", function(){

    if (!navigator.geolocation) {
        alert("Geolocation is not supported by your browser");
        return;
    }

    // 🔄 Loading feel
    this.innerText = "Fetching location...";
    this.disabled = true;

    navigator.geolocation.getCurrentPosition(
        function(position){

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            // 👉 Marker move
            marker.setLatLng([lat, lon]);

            // 👉 Map zoom
            map.setView([lat, lon], 15);

            // 👉 Address fetch
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
            .then(res => res.json())
            .then(data => {

                document.getElementById("locationInput").value = data.display_name;

            });

            // reset button
            document.getElementById("currentLocationBtn").innerText = "📍 Use My Current Location";
            document.getElementById("currentLocationBtn").disabled = false;

        },
        function(error){

            alert("Location access denied or failed!");

            document.getElementById("currentLocationBtn").innerText = "📍 Use My Current Location";
            document.getElementById("currentLocationBtn").disabled = false;
        }
    );

});

</script>

{% endblock %}
