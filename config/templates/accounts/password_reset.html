{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}

<style>

.reset-wrapper{
min-height:80vh;
display:flex;
align-items:center;
justify-content:center;
}

.reset-card{
width:420px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
border-radius:20px;
padding:40px;
box-shadow:0 25px 60px rgba(0,0,0,0.3);
animation:fadeUp 0.7s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.reset-title{
font-weight:800;
font-size:26px;
text-align:center;
margin-bottom:10px;
}

.reset-text{
text-align:center;
color:#6c757d;
margin-bottom:25px;
}

.reset-card input{
width:100%;
height:50px;
border-radius:12px;
border:1px solid #ddd;
padding:0 15px;
}

.reset-btn{
height:50px;
border:none;
border-radius:30px;
font-weight:700;
background:linear-gradient(135deg,#ff6a00,#ee0979);
color:white;
transition:.3s;
}

.reset-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

</style>

<div class="reset-wrapper">

<div class="reset-card">

<h3 class="reset-title">🔐 Reset Password</h3>

<p class="reset-text">
Enter your email to receive password reset link.
</p>

<form method="post">
{% csrf_token %}

<div class="mb-3">
{{ form.email }}
</div>

<div class="d-grid">
<button class="reset-btn">
Send Reset Link 🚀
</button>
</div>

</form>

</div>

</div>

{% endblock %}
