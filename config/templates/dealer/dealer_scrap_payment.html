{% extends "base.html" %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Wrapper */
.royal-payment {
    background: linear-gradient(135deg, #7777be, #067d83);
    padding: 40px;
    border-radius: 15px;
    font-family: 'Poppins', sans-serif;
    color: #fff;
    max-width: 600px;
    margin: 40px auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* Heading */
.royal-payment h3 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 600;
    color: #f5c542;
    letter-spacing: 1px;
}

/* Info Box */
.payment-card {
    background: rgba(255,255,255,0.06);
    padding: 25px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

/* Labels */
.payment-card p {
    font-size: 15px;
    margin: 10px 0;
    color: #ddd;
}

/* Highlight Value */
.payment-card span {
    color: #fff;
    font-weight: 500;
}

/* Amount Highlight */
.amount {
    font-size: 22px;
    font-weight: 600;
    color: #00e676;
}

/* Button */
.pay-btn {
    display: block;
    width: 100%;
    margin-top: 25px;
    padding: 12px;
    border-radius: 30px;
    border: none;
    font-weight: 600;
    font-size: 16px;
    background: linear-gradient(135deg, #ff9f1c, #ffd166);
    color: #000;
    transition: 0.3s ease;
}

.pay-btn:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #ffd166, #ffe29a);
}

/* Smooth fade */
.royal-payment {
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

</style>

<div class="royal-payment">

<h2>Dealer Scrap Payment</h2>

    <p><strong>Scrap:</strong> {{ approved_request.scrap.category }}</p>
    <p><strong>Weight:</strong> {{ approved_request.requested_weight }} kg</p>
    <p><strong>Total Amount:</strong> ₹ {{ amount }}</p>

    <!-- ✅ FINAL WORKING FORM -->
    <form method="POST" action="{% url 'dealer_stripe_pay' approved_request.id %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-success btn-lg px-5">
            Pay with Stripe
        </button>
    </form>

</div>

</div>

{% endblock %}
